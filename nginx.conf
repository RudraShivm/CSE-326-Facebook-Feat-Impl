server {
    listen 80;
    server_name facebook.rudrashivm.me;
    
    # Redirect all HTTP traffic to HTTPS (Port 443)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name facebook.rudrashivm.me;

    # Cloudflare Origin Certificates mapped via Docker volume
    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # Authenticated Origin Pulls (mTLS Check)
    ssl_client_certificate /etc/nginx/certs/cloudflare-ca.pem;
    ssl_verify_client on;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 12m;

    # SPA routing — serve index.html for all client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API traffic to the internal backend container.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets aggressively
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
