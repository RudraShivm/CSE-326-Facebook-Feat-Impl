name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY_LOGIN_SERVER: ${{ secrets.REGISTRY_LOGIN_SERVER }}
  AZURE_WEBAPP_NAME_FRONTEND: ${{ secrets.AZURE_WEBAPP_NAME_FRONTEND }}
  AZURE_WEBAPP_NAME_BACKEND: ${{ secrets.AZURE_WEBAPP_NAME_BACKEND }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Backend Image
        run: |
          docker build -f Dockerfile.backend -t ${{ env.REGISTRY_LOGIN_SERVER }}/facebook-backend:${{ github.sha }} .
          docker push ${{ env.REGISTRY_LOGIN_SERVER }}/facebook-backend:${{ github.sha }}

      - name: Build and Push Frontend Image
        run: |
          docker build -f Dockerfile.frontend \
            --build-arg VITE_API_BASE_URL=https://${{ env.AZURE_WEBAPP_NAME_BACKEND }}.azurewebsites.net/api/v1 \
            -t ${{ env.REGISTRY_LOGIN_SERVER }}/facebook-frontend:${{ github.sha }} .
          docker push ${{ env.REGISTRY_LOGIN_SERVER }}/facebook-frontend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Backend to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME_BACKEND }}
          images: ${{ env.REGISTRY_LOGIN_SERVER }}/facebook-backend:${{ github.sha }}

      - name: Deploy Frontend to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME_FRONTEND }}
          images: ${{ env.REGISTRY_LOGIN_SERVER }}/facebook-frontend:${{ github.sha }}
