name: Deploy To Azure Linux VM

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      VM_APP_DIR: ${{ vars.VM_APP_DIR }}

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script_stop: true
          envs: VM_APP_DIR
          script: |
            set -eu

            APP_DIR="${VM_APP_DIR:-$HOME/CSE-326-Information-System-Design/9.Facebook-Feat-Impl}"

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Expected git repository at $APP_DIR but it was not found."
              exit 1
            fi

            cd "$APP_DIR"
            git fetch origin main
            git pull --ff-only origin main

            if [ -f ./.vm-secrets ]; then
              . ./.vm-secrets
            fi

            docker compose -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.prod.yml ps
