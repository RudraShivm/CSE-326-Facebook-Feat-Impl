# ─────────────────────────────────────────────
# Docker Compose — Development Services
# ─────────────────────────────────────────────
# Usage:
#   docker-compose up -d        # Start all services
#   docker-compose down         # Stop all services
#   docker-compose logs -f db   # View PostgreSQL logs
# ─────────────────────────────────────────────

version: "3.8"

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: facebook_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: facebook_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Ensure the isolated test database exists for local Jest runs.
  db-test-init:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    command:
      - /bin/sh
      - -c
      - >
        until pg_isready -h db -U postgres; do sleep 1; done;
        psql -h db -U postgres -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'facebook_db_test'" |
        grep -q 1 || psql -h db -U postgres -d postgres -c "CREATE DATABASE facebook_db_test";
    restart: "no"

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: facebook_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
